name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - feature/monolith-deployment

env:
  PROJECT_ID: danceboard-app
  REGION: europe-central2
  SERVICE: danceboard-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Logowanie do Google Cloud (Workload Identity Federation - zalecane)
      # Zobacz: https://github.com/google-github-actions/auth
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}' # Dodaj service account json do GitHub Secrets

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Budujemy Fat-Jar z wbudowanym Frontend'em używając Gradle 
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :backend:buildFatJar

      # Cloud Build i Deploy
      # Deploy na Cloud Run używając wybudowanego pliku z gotowym monomitem (backend/Dockerfile musi go wskazywać)
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          source: ./backend # Cloud Build użyje backend/Dockerfile i znajdzie zbudowany plik w build/libs/
          env_vars: |
            FRONTEND_URL=https://danceboard-backend-xxx.a.run.app
            # Tutaj możesz dodać zmienne NEON_DB_URL itp.
